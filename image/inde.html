<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style> 


     .head{
        display: flex;
        gap: 10px;
        flex-direction: row;
        height: 190px;
        align-items: center;
        width: 190px;
        background-color: rgb(156, 132, 12);
        border-radius: 10px;
        justify-content: center;
        align-content: center;
        text-align: center;
        padding: 20px;
      
        
    
     }
     
     .row{
        display: flex;
        justify-content: center;
        gap: 20px;
        padding: 10px;
        margin: none;
        background-color: rgb(31, 4, 94);

     }
     @media(max-width: 450px){
        .head{
            flex-direction: column;

        }
        .row{
            flex-direction: column;
            display: flex;
            margin: auto;
            
        }
     }
     svg{
        
        color: yellow;
     }
     h3{
        color:white;
        font-family: poppins, sans-serif;
     }
     .card{
      background-color: black;
      padding: 10px;
      border-radius: 10px;  
     }
</style>
<body>
    <div class="row">
   

    <section class="head">
    <div class="card">
       
    <H3> Hello thh</H3>
    
    </div>
    
    </section>
    </div>

</body>
</html>
